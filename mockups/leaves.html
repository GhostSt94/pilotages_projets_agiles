<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cadence — Congés & calendrier</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="h-screen overflow-hidden bg-slate-50 text-slate-800">
  <div class="flex h-screen">
    <div id="sidebar"></div>
    <div class="flex flex-1 flex-col overflow-hidden">
      <div id="topbar"></div>

      <div class="flex-1 overflow-y-auto p-6">
        <div class="grid gap-6 lg:grid-cols-[1fr_360px]">

          <!-- Calendrier d'équipe -->
          <div>
            <div class="mb-3 flex items-center gap-3">
              <h2 class="text-base font-semibold text-slate-900">Calendrier d'équipe — Juin 2026</h2>
              <div class="ml-auto flex items-center gap-1">
                <button class="grid h-8 w-8 place-items-center rounded-lg border border-slate-300 text-slate-500 hover:bg-slate-50"><i data-lucide="chevron-left" class="h-4 w-4"></i></button>
                <button class="grid h-8 w-8 place-items-center rounded-lg border border-slate-300 text-slate-500 hover:bg-slate-50"><i data-lucide="chevron-right" class="h-4 w-4"></i></button>
              </div>
            </div>

            <div class="rounded-xl border border-slate-200 bg-white p-4">
              <div class="grid grid-cols-7 gap-1 text-center text-[11px] font-medium uppercase text-slate-400">
                <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div class="text-slate-300">S</div><div class="text-slate-300">D</div>
              </div>
              <div id="cal" class="mt-1 grid grid-cols-7 gap-1"></div>
              <div class="mt-4 flex flex-wrap items-center gap-4 text-xs text-slate-500">
                <span class="flex items-center gap-1.5"><span class="h-3 w-3 rounded bg-emerald-200"></span> Congé approuvé</span>
                <span class="flex items-center gap-1.5"><span class="h-3 w-3 rounded border border-dashed border-amber-400 bg-amber-50"></span> En attente</span>
                <span class="flex items-center gap-1.5"><span class="h-3 w-3 rounded bg-indigo-100 ring-1 ring-indigo-300"></span> Sprint actif</span>
              </div>
            </div>

            <!-- Demandes à valider -->
            <div class="mt-6">
              <h3 class="mb-3 flex items-center gap-2 text-sm font-semibold text-slate-900"><i data-lucide="inbox" class="h-4 w-4 text-indigo-500"></i> Demandes à valider <span class="rounded-full bg-amber-100 px-2 py-0.5 text-xs font-medium text-amber-700">1</span></h3>
              <div class="rounded-xl border border-slate-200 bg-white divide-y divide-slate-100">
                <div class="flex items-center gap-3 p-3.5">
                  <span class="grid h-8 w-8 place-items-center rounded-full bg-amber-100 text-xs font-semibold text-amber-700">YY</span>
                  <div class="min-w-0">
                    <div class="text-sm font-medium text-slate-800">Yassine Younsi <span class="font-normal text-slate-400">· maladie</span></div>
                    <div class="text-xs text-slate-500">23 juin (1 jour) — Rendez-vous médical</div>
                  </div>
                  <div class="ml-auto flex items-center gap-2">
                    <button class="inline-flex items-center gap-1 rounded-lg bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-emerald-700"><i data-lucide="check" class="h-3.5 w-3.5"></i> Approuver</button>
                    <button class="inline-flex items-center gap-1 rounded-lg border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-50"><i data-lucide="x" class="h-3.5 w-3.5"></i> Refuser</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Colonne droite : déclarer + mes congés -->
          <aside class="space-y-6">
            <div class="rounded-xl border border-slate-200 bg-white p-4">
              <h3 class="mb-3 text-sm font-semibold text-slate-900">Déclarer un congé</h3>
              <div class="space-y-3">
                <div>
                  <label class="mb-1 block text-xs font-medium text-slate-600">Type</label>
                  <select class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500">
                    <option>Vacances</option><option>Maladie</option><option>Personnel</option><option>Autre</option>
                  </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                  <div><label class="mb-1 block text-xs font-medium text-slate-600">Du</label><input type="date" value="2026-06-25" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500" /></div>
                  <div><label class="mb-1 block text-xs font-medium text-slate-600">Au</label><input type="date" value="2026-06-27" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500" /></div>
                </div>
                <div>
                  <label class="mb-1 block text-xs font-medium text-slate-600">Motif (optionnel)</label>
                  <textarea rows="2" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500" placeholder="Quelques mots…"></textarea>
                </div>
                <button class="w-full rounded-lg bg-indigo-600 py-2 text-sm font-semibold text-white hover:bg-indigo-700">Envoyer la demande</button>
              </div>
            </div>

            <div class="rounded-xl border border-slate-200 bg-white p-4">
              <h3 class="mb-3 text-sm font-semibold text-slate-900">Mes congés</h3>
              <div id="myleaves" class="space-y-2.5"></div>
            </div>
          </aside>

        </div>
      </div>
    </div>
  </div>

  <script src="shell.js"></script>
  <script>
    // Calendrier juin 2026 : 1er juin = lundi. 30 jours.
    const sprintDays = []; for(let d=13; d<=26; d++) sprintDays.push(d);
    const approved = { '18':'SS','19':'SS' };       // Sara, congé approuvé
    const pending  = { '23':'YY' };                  // Yassine, en attente
    const weekendCols = [5,6]; // sam, dim (index 0=lundi)
    let cells = '';
    // 1 juin = lundi -> pas d'offset
    for(let d=1; d<=30; d++){
      const col = (d-1)%7;
      const we = weekendCols.includes(col);
      const inSprint = sprintDays.includes(d);
      let cls = 'border-slate-100';
      let badge = '';
      if(approved[d]){ cls='border-emerald-200 bg-emerald-50'; badge=`<span class="mt-1 inline-block rounded bg-emerald-200 px-1 text-[10px] font-medium text-emerald-800">${approved[d]}</span>`; }
      else if(pending[d]){ cls='border-dashed border-amber-400 bg-amber-50'; badge=`<span class="mt-1 inline-block rounded border border-amber-300 px-1 text-[10px] font-medium text-amber-700">${pending[d]}</span>`; }
      else if(we){ cls='bg-slate-50 border-slate-100'; }
      const ring = inSprint && !approved[d] && !pending[d] ? 'ring-1 ring-indigo-200' : (inSprint?'ring-1 ring-indigo-200':'');
      cells += `<div class="min-h-[58px] rounded-lg border ${cls} ${ring} p-1.5 text-left">
        <span class="text-xs ${we?'text-slate-300':'text-slate-500'}">${d}</span>${badge}</div>`;
    }
    document.getElementById('cal').innerHTML = cells;

    const my = [
      { type:'Vacances', range:'18 → 19 juin', status:'approved' },
      { type:'Vacances', range:'18 → 22 juil.', status:'approved' },
      { type:'Personnel', range:'25 → 27 juin', status:'pending' },
    ];
    document.getElementById('myleaves').innerHTML = my.map(l=>`
      <div class="flex items-center gap-2 rounded-lg border border-slate-100 px-3 py-2">
        <div class="min-w-0">
          <div class="text-sm font-medium text-slate-700">${l.type}</div>
          <div class="text-xs text-slate-400">${l.range}</div>
        </div>
        <span class="ml-auto">${leaveBadge(l.status)}</span>
      </div>`).join('');

    Shell.mount('leaves', 'Congés & calendrier', 'Équipe Atlas');
    lucide.createIcons();
  </script>
</body>
</html>
