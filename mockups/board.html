<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cadence — Tableau Kanban</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>body{font-family:'Inter',system-ui,sans-serif}.col-scroll::-webkit-scrollbar{width:6px}.col-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}</style>
</head>
<body class="h-screen overflow-hidden bg-slate-50 text-slate-800">
  <div class="flex h-screen">
    <div id="sidebar"></div>
    <div class="flex flex-1 flex-col overflow-hidden">
      <div id="topbar"></div>

      <!-- Barre de sprint -->
      <div class="flex flex-wrap items-center gap-3 border-b border-slate-200 bg-white px-5 py-3">
        <span class="inline-flex items-center gap-1.5 rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>Sprint actif</span>
        <div class="font-semibold text-slate-900">Sprint 1 — Catalogue &amp; Panier</div>
        <div class="flex items-center gap-1 text-xs text-slate-500"><i data-lucide="calendar" class="h-3.5 w-3.5"></i> 13 → 26 juin</div>
        <div class="hidden items-center gap-1 text-xs text-slate-500 sm:flex"><i data-lucide="target" class="h-3.5 w-3.5"></i> Livrer le catalogue produit et le panier de base</div>
        <div class="ml-auto flex items-center gap-2">
          <a href="sprints.html" class="inline-flex items-center gap-1.5 rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-50"><i data-lucide="gauge" class="h-4 w-4"></i> Capacité</a>
          <button class="inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-indigo-700"><i data-lucide="plus" class="h-4 w-4"></i> Tâche</button>
        </div>
      </div>

      <!-- Colonnes -->
      <div id="board" class="flex flex-1 gap-4 overflow-x-auto p-5"></div>
    </div>
  </div>

  <script src="shell.js"></script>
  <script>
    const tasks = {
      todo: [
        { title:'Persistance du panier (localStorage)', type:'tech', priority:'medium', est:5, who:'YY', color:'amber', labels:['catalogue'] },
        { title:'Bug : prix TTC mal arrondi', type:'bug', priority:'critical', est:3, who:'YY', color:'amber', labels:['catalogue'] },
      ],
      in_progress: [
        { title:'Filtres et recherche catalogue', type:'feature', priority:'high', est:12, who:'DD', color:'sky', labels:['catalogue'], comments:2 },
        { title:'Ajout au panier', type:'feature', priority:'high', est:10, who:'SS', color:'rose', labels:['catalogue'] },
      ],
      in_review: [
        { title:'Fiche produit détaillée', type:'feature', priority:'medium', est:6, who:'SS', color:'rose', labels:['catalogue'], comments:1 },
      ],
      done: [
        { title:'Page liste des produits', type:'feature', priority:'medium', est:8, who:'DD', color:'sky', labels:['catalogue'] },
        { title:'Composant en-tête + navigation', type:'feature', priority:'medium', est:4, who:'DD', color:'sky', labels:['catalogue'] },
      ],
    };

    function card(t) {
      const ty = TYPE[t.type];
      return `<div class="cursor-grab rounded-xl border border-slate-200 bg-white p-3 shadow-sm transition hover:shadow-md active:cursor-grabbing">
        <div class="flex items-center justify-between">
          <span class="inline-flex items-center gap-1 text-[11px] font-medium ${ty.cls}"><i data-lucide="${ty.icon}" class="h-3.5 w-3.5"></i>${ty.label}</span>
          ${priorityTag(t.priority)}
        </div>
        <p class="mt-2 text-sm font-medium leading-snug text-slate-800">${t.title}</p>
        <div class="mt-2 flex flex-wrap gap-1">${(t.labels||[]).map(l=>`<span class="rounded bg-slate-100 px-1.5 py-0.5 text-[10px] text-slate-500">${l}</span>`).join('')}</div>
        <div class="mt-3 flex items-center gap-3 text-xs text-slate-400">
          <span class="inline-flex items-center gap-1"><i data-lucide="clock" class="h-3.5 w-3.5"></i>${t.est} h</span>
          ${t.comments?`<span class="inline-flex items-center gap-1"><i data-lucide="message-square" class="h-3.5 w-3.5"></i>${t.comments}</span>`:''}
          <span class="ml-auto">${avatar(t.who, t.color)}</span>
        </div>
      </div>`;
    }

    function column(key) {
      const m = STATUS[key];
      const list = tasks[key];
      const hours = list.reduce((s,t)=>s+t.est,0);
      return `<div class="flex w-80 shrink-0 flex-col rounded-xl bg-slate-100/70">
        <div class="flex items-center gap-2 px-3 py-3">
          <span class="h-2 w-2 rounded-full ${m.dot}"></span>
          <span class="text-sm font-semibold text-slate-700">${m.label}</span>
          <span class="rounded-full bg-white px-2 py-0.5 text-xs font-medium text-slate-500">${list.length}</span>
          <span class="ml-auto text-xs text-slate-400">${hours} h</span>
        </div>
        <div class="col-scroll flex-1 space-y-2.5 overflow-y-auto px-2.5 pb-2.5">
          ${list.map(card).join('')}
          <button class="flex w-full items-center justify-center gap-1 rounded-lg border border-dashed border-slate-300 py-2 text-xs font-medium text-slate-400 hover:border-indigo-300 hover:text-indigo-500"><i data-lucide="plus" class="h-4 w-4"></i> Ajouter</button>
        </div>
      </div>`;
    }

    document.getElementById('board').innerHTML = ['todo','in_progress','in_review','done'].map(column).join('');
    Shell.mount('board', 'Tableau Kanban', 'Atlas Retail · sprint actif');
    lucide.createIcons();
  </script>
</body>
</html>
